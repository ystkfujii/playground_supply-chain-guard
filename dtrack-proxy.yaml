apiVersion: v1
kind: ConfigMap
metadata:
  name: dtrack-local-proxy-nginx
  namespace: dtrack
data:
  default.conf: |
    server {
      listen 8080;

      location /api/ {
        proxy_pass http://dtrack-dependency-track-api-server:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }

      location / {
        proxy_pass http://dtrack-dependency-track-frontend:8080/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
      }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dtrack-local-proxy
  namespace: dtrack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: dtrack-local-proxy
  template:
    metadata:
      labels:
        app: dtrack-local-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:1.27-alpine
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: config
        configMap:
          name: dtrack-local-proxy-nginx
---
apiVersion: v1
kind: Service
metadata:
  name: dtrack-local-proxy
  namespace: dtrack
spec:
  type: ClusterIP
  selector:
    app: dtrack-local-proxy
  ports:
  - name: http
    port: 8080
    targetPort: 8080
